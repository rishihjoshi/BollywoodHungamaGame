name: Fetch TMDB Images

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch TMDB image URLs
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_API_READ_ACCESS_TOKEN }}
        run: node scripts/fetch-tmdb-images.js

      - name: Commit updated words.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/data/words.json || (
            git add docs/data/words.json &&
            git commit -m "chore: update TMDB image URLs in words.json [skip ci]" &&
            git push
          )
